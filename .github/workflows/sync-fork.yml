name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository != 'end-4/dots-hyprland'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: gh repo sync "$GITHUB_REPOSITORY" --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync tags
        run: |
          git remote add upstream https://github.com/end-4/dots-hyprland.git || true
          git fetch upstream --tags
          git push origin --tags
