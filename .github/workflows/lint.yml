name: Lint Shell Scripts

on:
  push:
    paths:
      - '**.sh'
      - 'setup'
      - 'diagnose'
  pull_request:
    paths:
      - '**.sh'
      - 'setup'
      - 'diagnose'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find . -name '*.sh' -not -path './.git/*' -not -path './cache/*' | xargs shellcheck --shell=bash --severity=warning || true
          shellcheck --shell=bash --severity=warning setup diagnose || true
