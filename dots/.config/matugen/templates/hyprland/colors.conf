general {
    col.active_border = rgba({{colors.primary.default.hex_stripped}}CC)
    col.inactive_border = rgba({{colors.surface_variant.default.hex_stripped}}77)
}

misc {
    background_color = rgba({{colors.surface.default.hex_stripped}}FF)
}

plugin {
    hyprbars {
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba({{colors.surface.default.hex_stripped}}FF)
        col.text = rgba({{colors.on_surface.default.hex_stripped}}FF)

        hyprbars-button = rgb({{colors.on_surface.default.hex_stripped}}), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb({{colors.on_surface.default.hex_stripped}}), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb({{colors.on_surface.default.hex_stripped}}), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba({{colors.primary.default.hex_stripped}}CC) rgba({{colors.primary.default.hex_stripped}}77), match:pin 1