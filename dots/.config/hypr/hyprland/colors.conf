# Illogical-impulse color scheme
# Generated by matugen when wallpaper changes
# Fallback colors (used until matugen runs)

general {
    col.active_border = rgba(7B68AECC)
    col.inactive_border = rgba(4A454799)
}

misc {
    background_color = rgba(1D1B1DFF)
}

plugin {
    hyprbars {
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true
        bar_color = rgba(1D1B1DFF)
        col.text = rgba(EEEEEEFF)
        hyprbars-button = rgb(EEEEEE), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(EEEEEE), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(EEEEEE), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(C77DB0AA) rgba(C77DB077), match:pin 1