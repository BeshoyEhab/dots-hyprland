##########################################################################
#                              CHEAT SHEET                               #
##########################################################################
#
#  --- WINDOW MANAGEMENT ---
#  New Window (Right) ..... F5
#  New Window (Below) ..... F6
#  Close Window ........... Ctrl + Shift + W
#  Move Focus ............. Ctrl + Arrow Keys
#  Move Window ............ Ctrl + Shift + Arrow Keys
#  Resize Window .......... Ctrl + Shift + R
#
#  --- LAYOUTS ---
#  Next Layout ............ Ctrl + Shift + L
#  Tall Layout ............ F9
#  Stack (Zoom) ........... F10
#
#  --- TABS ---
#  New Tab ................ Ctrl + Shift + T
#  Close Tab .............. Ctrl + Shift + Q/W
#  Next Tab ............... F7
#  Prev Tab ............... F8
#
#  --- FONT & MISC ---
#  Increase Size .......... Ctrl + Shift + =
#  Decrease Size .......... Ctrl + Shift + -
#  Reset Size ............. Ctrl + Shift + Backspace
#  Copy to Clipboard ...... Ctrl + Shift + C
#  Paste .................. Ctrl + Shift + V
#
##########################################################################


# --- FONTS ---
# BEGIN_KITTY_FONTS
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 11.0


# --- WINDOW LAYOUT & LOOK ---
enabled_layouts splits:split_axis=horizontal

window_padding_width  20
window_margin_width   0
window_border_width   1.0

active_border_color      #b4befe
inactive_border_color    #6c7086
hide_window_decorations  no
remember_window_size     no
confirm_os_window_close  0


# --- CURSOR & SHELL ---
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
cursor_trail          10
shell_integration     no-cursor

scrollback_lines       5000
wheel_scroll_multiplier 3.0
mouse_hide_wait        -1

enable_audio_bell no


# --- COLORS ---
include colors.conf
background_opacity 1.0
background_blur    1

selection_foreground  #ebdbb2
selection_background  #d65d0e

active_tab_foreground   #ebdbb2
active_tab_background   #458588
active_tab_font_style   bold
inactive_tab_foreground #ebdbb2
inactive_tab_background #8ec07c
inactive_tab_font_style normal

tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_edge        bottom
tab_bar_align       left

cursor            #bdae93
cursor_text_color #665c54
url_color         #458588


# --- KEY MAPPINGS ---

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font Size
map ctrl+shift+equal     change_font_size all +1.0
map ctrl+shift+minus     change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# Window Management
map f5               launch --location=vsplit
map f6               launch --location=hsplit
map ctrl+shift+enter launch --location=split
map ctrl+shift+w     close_window

# Window Navigation (Hyprland-style: Ctrl+Arrows)
map ctrl+down  neighboring_window down
map ctrl+up    neighboring_window up
map ctrl+left  neighboring_window left
map ctrl+right neighboring_window right

# Window Movement (Hyprland-style: Ctrl+Shift+Arrows)
map ctrl+shift+down  move_window down
map ctrl+shift+up    move_window up
map ctrl+shift+left  move_window left
map ctrl+shift+right move_window right

# Resize Mode
map ctrl+shift+r start_resizing_window

# Tab Management
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map f7           next_tab
map f8           previous_tab

# Layout Management
map ctrl+shift+l next_layout
map f9           goto_layout tall
map f10          goto_layout stack
